default_stages: [pre-push]

repos:
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.2
    hooks:
      - id: flake8
        files: ^(src|tests)/.*\.py$
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-q", "-lll"]
        files: ^src/.*\.py$
