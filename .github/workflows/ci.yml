name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[db,quality]"

      - name: Compile
        run: python3 -m compileall src tests

      - name: Lint
        run: flake8 src tests

      - name: Complexity
        run: radon cc -a -s src

      - name: Maintainability
        run: radon mi -s src

      - name: Test
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=80

      - name: Security
        run: bandit -r src
